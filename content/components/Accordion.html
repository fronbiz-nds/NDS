<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
	<title></title>
	<!-- NDS CSS -->
	<link rel="stylesheet" href="./../assets/css/nds-common.css" />
	<link rel="stylesheet" href="./../assets/css/nds-components.css" />
	<!-- Guide CSS -->
	<link rel="stylesheet" href="./../guide/css/guide.css" />
</head>
<body>
	<div class="gl">
		<!-- NDS components : S -->

<div class="gc__heading">Notice</div>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="sticker">
		<div class="nds-accordion -notice" data-nds-role="fold">
			<button type="button" class="title" data-nds-role="marker">알아두세요</button>
			<div class="panel" data-nds-role="hidden">
				<ul class="ul -bullet">
					<li>목록</li>
				</ul>
			</div>
		</div>
	</div>
</script>
		 
<div class="gc__heading">Line</div>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="nds-accordion -line" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">제목</button>
		<div class="panel" data-nds-role="hidden">
			<div class="dummy">내용</div>
		</div>
	</div>
</script>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="nds-accordion -line -active" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">제목</button>
		<div class="panel" data-nds-role="hidden">
			<div class="dummy">내용</div>
		</div>
	</div>
</script>

<div class="gc__heading">Box-Text</div>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="nds-accordion -box" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">제목</button>
		<div class="panel" data-nds-role="hidden">
			<div class="dummy">내용</div>
		</div>
	</div>
</script>
<div class="gc__heading">Box-List</div>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="nds-accordion -box -list" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">
			<div class="badges">
				<span class="badge line-gray">라벨</span>
			</div>
			<div class="info">
				<span class="name">
					<span>타이틀</span>
				</span>
				<span class="sub-info">
					<span>부가설명</span>
				</span>
			</div>
		</button>
		<div class="panel" data-nds-role="hidden">
			<dl class="dl">
				<div>
					<dt>타이틀</dt>
					<dd>데이터</dd>
				</div>
				<div>
					<dt>타이틀</dt>
					<dd>데이터</dd>
				</div>
				<div>
					<dt>타이틀</dt>
					<dd>데이터</dd>
				</div>
			</dl>
		</div>
	</div>
	<div class="nds-accordion -box -list" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">
			<div class="badges">
				<span class="badge line-gray">라벨</span>
			</div>
			<div class="info">
				<span class="name">
					<span>타이틀</span>
				</span>
				<span class="sub-info">
					<span>부가설명</span>
				</span>
			</div>
		</button>
		<div class="panel" data-nds-role="hidden">
			<dl class="dl">
				<div>
					<dt>타이틀</dt>
					<dd>데이터</dd>
				</div>
				<div>
					<dt>타이틀</dt>
					<dd>데이터</dd>
				</div>
				<div>
					<dt>타이틀</dt>
					<dd>데이터</dd>
				</div>
			</dl>
		</div>
	</div>
</script>
<div class="gc__heading">Graybox/basic</div>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="nds-accordion -graybox" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">제목</button>
		<div class="panel" data-nds-role="hidden">
			<div class="dummy">내용</div>
		</div>
	</div>
</script>
<div class="gc__heading">Graybox/list</div>
<script data-size="2" data-title="State=close" type="text/template">
	<div class="nds-accordion -graybox" data-nds-role="fold">
		<button type="button" class="title" data-nds-role="marker">계약서류 확인</button>
		<div class="panel" data-nds-role="hidden">
			<div class="download">
				<ul>
					<li>
						<div>예금계약서(비대면_저축성)</div>
						<div>
							<button type="button" title="예금계약서(비대면_저축성)"
								class="down-btn"><span class="hide">다운로드</span></button>
							<button type="button" title="예금계약서(비대면_저축성)"
								aria-haspopup="true" class="go-link"><span
									class="hide">바로보기</span></button>
						</div>
					</li>
					<li>
						<div>NH고향사랑기부예금 상품설명서</div>
						<div>
							<button type="button" title="NH고향사랑기부예금 상품설명서"
								class="down-btn"><span class="hide">다운로드</span></button>
							<button type="button" title="NH고향사랑기부예금 상품설명서"
								aria-haspopup="true" class="go-link"><span
									class="hide">바로보기</span></button>
						</div>
					</li>
					<li>
						<div>NH고향사랑기부예금 핵심상품설명서</div>
						<div>
							<button type="button" title="NH고향사랑기부예금 핵심상품설명서"
								class="down-btn"><span class="hide">다운로드</span></button>
							<button type="button" title="NH고향사랑기부예금 핵심상품설명서"
								aria-haspopup="true" class="go-link"><span
									class="hide">바로보기</span></button>
						</div>
					</li>
					<li>
						<div>NH고향사랑기부예금 약관</div>
						<div>
							<button type="button" title="NH고향사랑기부예금 약관"
								class="down-btn"><span class="hide">다운로드</span></button>
							<button type="button" title="NH고향사랑기부예금 약관" aria-haspopup="true"
								class="go-link"><span class="hide">바로보기</span></button>
						</div>
					</li>
					<li>
						<div>예금거래기본약관 외</div>
						<div>
							<button type="button" title="예금거래기본약관 외" class="down-btn"><span
									class="hide">다운로드</span></button>
							<button type="button" title="예금거래기본약관 외" aria-haspopup="true"
								class="go-link"><span class="hide">바로보기</span></button>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>
</script>

		<!-- NDS components : E -->
	</div>

	<script src="./../guide/js/guide.js"></script>
