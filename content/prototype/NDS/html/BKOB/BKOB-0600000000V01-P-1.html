<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">계좌를 선택해 주세요</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="choose-account-Wrap">
                        <div class="field">
                            <div class="text">
                                <div class="choose-account-input">
                                    <input type="text" id="text" readonly placeholder="계좌번호 직접 입력">
                                    <button type="button" class="button -tertiary jsChooseBtn -sm -inline">직접 입력</button>
                                </div>
                                <p class="message">입력 정보 안내 메시지 출력</p>
                            </div>
                        </div>
                        <div class="custom-key-display">
                            <div class="custom-key-wrap">
                                <button type="button" value="1" title="숫자 1 입력">1</button>
                                <button type="button" class="key-btn" value="2" title="숫자 2 입력">2</button>
                                <button type="button" class="key-btn" value="3" title="숫자 3 입력">3</button>
                                <button type="button" class="key-btn" value="4" title="숫자 4 입력">4</button>
                                <button type="button" class="key-btn" value="5" title="숫자 5 입력">5</button>
                                <button type="button" class="key-btn" value="6" title="숫자 6 입력">6</button>
                                <button type="button" class="key-btn" value="7" title="숫자 7 입력">7</button>
                                <button type="button" class="key-btn" value="8" title="숫자 8 입력">8</button>
                                <button type="button" class="key-btn" value="9" title="숫자 9 입력">9</button>
                                <button type="button" class="key-btn" disabled aria-hidden="true">NH</button>
                                <button type="button" class="key-btn" value="0" title="숫자 0 입력">0</button>
                                <button type="button" class="key-btn btn-del" title="마지막 숫자 삭제"></button>
                            </div>
                            <div class="buttons">
                                <button type="button" class="button -primary -lg">확인</button>
                            </div>
                        </div>
                    
                        <div class="choose-account-list account -borderless mb-0">
                            <div class="case-wrap16">
                                <div class="empty result">
                                    <p class="message">
                                        농·축협 오픈뱅킹 가입고객은 <br>
                                        다른금융 출금계좌를 선택할 수 없습니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- //.choose-account-Wrap -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');

        // 레이어 닫기(마지막 인자 기본값: false)
        // Layer.close('layer', function() {
        //     '콜백함수'
        // });

        // 레이어 닫기 + DOM 삭제
        // Layer.close('layer', function() {
        //     '콜백함수'
        // }, true);
    </script>

    <script>
        /* 키패드 키입력 예시 */
        const numKeyEmt = document.querySelectorAll('.custom-key-wrap button');
        numKeyEmt.forEach(numKeyEmt => {
            numKeyEmt.addEventListener('click',function () {
                let $targetInput;
                const $thisValLayer = numKeyEmt.closest('.custom-key-layer.-active');  //dim 없는 레이어 숫자 키패드
                const $thisValChoose = numKeyEmt.closest('.choose-account-Wrap');  //bottom sheet 숫자 키패드
                
                if ($thisValLayer !== null) {
                    $targetInput = numKey.numInput;
                } else if($thisValChoose !== null) {
                    $targetInput = $thisValChoose.querySelector('.choose-account-input input')
                    $targetInput.closest('.text').classList.remove('-textless');
                }
                let $thisval = numKeyEmt.value;

                if (numKeyEmt.classList.contains('btn-del')) {
                    if ($targetInput.value.length !== 0) {
                        $targetInput.value = $targetInput.value.slice(0,-1);
                        if ($targetInput.value.length == 0) {
                            setTimeout(() => {
                                $targetInput.closest('.text').classList.add('-textless');
                            }, 101);
                        }
                    }
                }else{
                    $targetInput.value = $targetInput.value + $thisval;
                }
            })
        });

        //10만, 50만.... 버튼 클릭시
        const amountBtn = document.querySelectorAll('.amount-btn-wrap button');
        amountBtn.forEach(amountBtn => {
            amountBtn.addEventListener('click',function () {
                let $targetInput;
                const $thisValLayer = amountBtn.closest('.custom-key-layer.-active');  //dim 없는 레이어 숫자 키패드
                const $thisValChoose = amountBtn.closest('.choose-account-Wrap');  //bottom sheet 숫자 키패드
                if ($thisValLayer !== null) {
                    $targetInput = numKey.numInput;
                } else if($thisValChoose !== null) {
                    $targetInput = $thisValChoose.querySelector('.choose-account-input input')
                }
                let $thisval = amountBtn.value;
                $targetInput.value = Number($thisval) + Number($targetInput.value);
            })
            
        });
        /* //키패드 키입력 예시 */
    </script>
</body>
</html>
