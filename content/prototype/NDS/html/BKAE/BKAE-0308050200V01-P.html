<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="navigation">
                <div class="header">
                    <div class="inner">
                        <h1 class="title">퇴직금 적용 수수료</h1>
                        <div class="funcs">
                            <button type="button" class="func -close"><span class="hide">닫기</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content" style="padding-bottom: 12rem;">
                    <div class="case-wrap -xxs">
                        <div class="card -sum -basic">
                            <div class="-box">
                                <dl class="dl">
                                    <div>
                                        <dt>발생일</dt>
                                        <dd>2023.03.17</dd>
                                    </div>
                                    <div>
                                        <dt>수수료 종료</dt>
                                        <dd>자산관리</dd>
                                    </div>
                                </dl>
                            </div>
                        </div>
                    </div>

                    <div class="case-wrap">
                        <div class="card -sum -acc-multi">
							<div class="dls -box pb-20" data-role="fold">
								<div class="top-data-area -data-view mb-0">
									<dl class="dl -reversed">
										<div>
											<dt>산출 수수료(C=AxB)</dt>
											<dd>1,246원</dd>
										</div>
										<div class="depth2">
											<dt>평균 잔액(A)</dt>
											<dd>1,038,411원</dd>
										</div>
										<div class="depth2 last-y">
											<dt>수수료율(B)</dt>
											<dd>0.12%</dd>
										</div>
                                        <div>
											<dt>수수료 할인 금액(D)</dt>
											<dd>0원</dd>
										</div>
                                        <div>
											<dt>납입 수수료(C-D)</dt>
											<dd>1,246원</dd>
										</div>
									</dl>
								</div>
							</div>
						</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        window.addEventListener('DOMContentLoaded', () => {
                const toast = document.querySelector('.toast');
                if (!toast) return;

                // 페이지 진입 시 -active 추가
                toast.classList.add('-active');

                setTimeout(() => {
                    toast.classList.remove('-active');
                }, 3000);
            });
    </script>
</body>
</html>
