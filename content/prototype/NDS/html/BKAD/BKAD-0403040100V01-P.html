            <div class="contents">

                    <h2 class="h4 mb-12">

                    </h2>
                    <ul class="ul -bullet">

                    </ul>

                    <div class="btn-wrap32">
                        <div class="buttons -double">
                            <button type="button" class="button -secondary -lg">투자자성향진단 다시하기</button>
