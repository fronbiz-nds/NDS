<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title></title>

	<link rel="stylesheet" href="../../../../assets/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
	<link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
	<div class="page">
		<div class="container">
            <div class="navigation -mall">
                <header class="header top">
                    <div class="inner process">
                        <div class="funcs">
                            <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                        </div>
                        <h1 class="title">운용상품 관리</h1>
                        <div class="funcs">
                            <button type="button" class="func">취소</button>
                        </div>
                    </div>
                </header>
            </div>
			<main class="contents">
				<div class="content">
                    <div class="h3-group flex-set">
                        <h2 class="h3">설명서/약관 동의</h2>
                        <div class="progress-num">
                            <span class="current">04</span>
                            <span class="total">08</span>
                        </div>
                    </div>

					<div class="agree -detail">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="optional-total">
                                <label for="optional-total">[필수] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="optional1">
                                    <label for="optional1">집합 투자 규약/약관</label>
                                    <button type="button" class="more"><span class="hide">집합 투자 규약/약관 약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="optional2">
                                    <label for="optional2">투자설명서</label>
                                    <button type="button" class="more"><span class="hide">투자설명서 약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="optional3">
                                    <label for="optional3">간이 투자설명서</label>
                                    <button type="button" class="more"><span class="hide">간이 투자설명서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="optional4">
                                    <label for="optional4">NH상품설명서</label>
                                    <button type="button" class="more"><span class="hide">NH상품설명서</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="total1">
                                <label for="total1">연금 펀드 세제 안내</label>
                            </div>
                            <button type="button" class="more"><span class="hide">약관명</span></button>
                        </div>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="total2">
                                <label for="total2">투자자 확인사항</label>
                            </div>
                            <button type="button" class="more"><span class="hide">약관명</span></button>
                        </div>
                    </div>
				</div>

				<div class="fixer">
					<div class="buttons">
						<button type="button" class="button -primary -lg">다음</button>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery.ui.touch-punch.min.js"></script>
	<script src="../../../../assets/libs/scrollout/dist/scroll-out.min.js"></script>
	<script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
	<script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
	<script src="../../../../assets/js/common-ui.js"></script>
	<script>
		// 스크립트 추가
	</script>
</body>
</html>
