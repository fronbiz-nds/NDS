<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title></title>

	<link rel="stylesheet" href="../../../../assets/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
	<link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
	<div class="page">
		<div class="container">
            <div class="navigation -mall">
                <header class="header top">
                    <div class="inner process">
                        <div class="funcs">
                            <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                        </div>
                        <h1 class="title">법무부 국고금</h1>
                        <div class="funcs">
                            <button type="button" class="func">취소</button>
                        </div>
                    </div>
                </header>
            </div>
			<main class="contents">
				<div class="content">
                    <div class="h3-group flex-set mb-12">
                        <h2 class="h3">조회</h2>
                        <div class="progress-num">
                            <span class="current">01</span>
                            <span class="total">04</span>
                        </div>
                    </div>
                    <div class="case-wrap">
                        <div class="segments tab -bar mb-12">
                            <div class="outer">
                                <div class="inner">
                                    <div role="tablist" class="list">
                                        <div class="item"><button type="button" role="tab" aria-selected="false"
                                                aria-controls="segments-panel3" id="segment5" class="">기납벌과금<span class="hide">선택됨</span></button>
                                        </div>
                                        <div class="item -active"><button type="button" role="tab" aria-selected="true" aria-controls="segments-panel4"
                                                id="segment6" class="">본납벌과금</button>
                                        </div>
                                        <span class="switcher" aria-hidden="true"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="segments-panels">
                            <div role="tabpanel" aria-labelledby="segment5" id="segments-panel3" class="segments-panel" tabindex="-1">
                                <p class="info">고지서에 지로번호가 7자리이고, 전자납부번호가 14자리일 경우</p>
                                <div class="field input mt-24 -error">
                                    <label for="tex0" class="label">지로번호</label>
                                    <div class="text -basic">
                                        <input type="tell" id="tex0" class="num-call right" placeholder="숫자 7자리 입력" maxlength="7" readonly>
                                        <p class="info">지로번호를 입력해 주세요.</p>
                                    </div>
                                </div>
                                <div class="field input">
                                    <label for="tex01" class="label">전자납부번호</label>
                                    <div class="text -basic">
                                        <input type="tell" id="tex01" class="num-call right" placeholder="숫자 14자리 입력" maxlength="14" readonly>
                                    </div>
                                </div>
                            </div>
                            <div role="tabpanel" aria-labelledby="segment6" id="segments-panel4" class="segments-panel -active" tabindex="0">
                                <p class="info">고지서에 지로번호가 없고, 전자납부번호가 0113으로 시작하며 19자리일 경우</p>
                                <div class="field serial">
                                    <p class="label">구분</p>
                                    <div class="box-radios -box -lg">
                                        <div class="box-radio">
                                            <input type="radio" name="period12344588" id="box-radio1-11107">
                                            <label for="box-radio1-11107">고객관리번호</label>
                                        </div>
                                        <div class="box-radio">
                                            <input type="radio" name="period12344588" id="box-radio1-11106" checked>
                                            <label for="box-radio1-11106">전자납부번호</label>
                                        </div>
                                    </div>
                                    <div class="mix id-number">
                                        <div class="text flex-3" data-clear="false">
                                            <input type="text" class="left-side num-call" id="rrn1" value="0123" placeholder="4자리" maxlength="4"
                                                title="첫번재 일련번호 4자리" aria-haspopup="true" readonly>
                                        </div>
                                        <div class="dash">-</div>
                                        <div class="text flex-9" data-clear="false">
                                            <input type="text" class="right-side num-call" data-id="rrn1" value="" placeholder="15자리 숫자 입력"
                                                title="두번재 일련번호 15자리" maxlength="15" aria-haspopup="true" readonly>
                                            <button class="clear" type="button" style="z-index: -1;">
                                                <div class="hide">입력 내용 삭제</div>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="field">
                                    <p class="label">기간</p>
                                    <div class="box-radios -sm">
                                        <div class="box-radio">
                                            <input type="radio" name="periods" id="period1" checked>
                                            <label for="period1">당일</label>
                                        </div>
                                        <div class="box-radio">
                                            <input type="radio" name="periods" id="period2">
                                            <label for="period2">1개월</label>
                                        </div>
                                        <div class="box-radio">
                                            <input type="radio" name="periods" id="period3">
                                            <label for="period3">3개월</label>
                                        </div>
                                        <div class="box-radio">
                                            <input type="radio" name="periods" id="period4">
                                            <label for="period4">6개월</label>
                                        </div>
                                    </div>
                                    <div class="mix datepicker">
                                        <div class="text" data-clear="false">
                                            <input type="text" class="left-side" id="date" value="2024.01.01" aria-haspopup="true" readonly>
                                        </div>
                                        <div class="space -lined date -start">
                                            <button type="button" class="icon-button -calendar" aria-haspopup="true"><span class="hide">달력
                                                    보기</span></button>
                                        </div>
                                        <div class="dash">~</div>
                                        <div class="text" data-clear="false">
                                            <input type="text" class="left-side" id="date" value="2024.01.01" aria-haspopup="true" readonly>
                                        </div>
                                        <div class="space -lined date -end">
                                            <button type="button" class="icon-button -calendar" aria-haspopup="true"><span class="hide">달력
                                                    보기</span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
				</div>

                <div class="sticker">
					<div class="notice -active" data-role="fold">
						<button type="button" class="title" data-role="marker">알아두세요</button>
						<div class="panel" data-role="visible">
							<ul class="ul -bullet">
                                <li>이용시간: 00:30 ~ 23:10</li>
                                <li>고객관리번호<주민 또는 법인(사업자)번호>로 조회하면 고객님에게 부과된 전체 기금고지서를 확인 후 납부할 수 있습니다.</li>
                                <li>전자납부번호(종이 고지서에 표기됨)로 조회하면 해당 기금 및 기타국고 고지서를 확인 후 납부할 수 있습니다.</li>
                            </ul>
						</div>
					</div>
				</div>

				<div class="fixer">
					<div class="buttons">
						<button type="button" class="button -primary -lg">다음</button>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery.ui.touch-punch.min.js"></script>
	<script src="../../../../assets/libs/scrollout/dist/scroll-out.min.js"></script>
	<script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
	<script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
	<script src="../../../../assets/js/common-ui.js"></script>
	<script>
		// 스크립트 추가
	</script>
</body>
</html>
