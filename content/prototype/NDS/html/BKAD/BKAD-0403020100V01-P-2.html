<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="navigation">
                <div class="header">
                    <div class="inner">
                        <h1 class="title">상품 추가</h1>
                        <div class="funcs">
                            <button type="button" class="func -close"><span class="hide">닫기</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <p class="sentence2 fw-400">김농협님의 <span class="red fw-500">적극투자형</span>에 적합한 상품입니다.</p>
                    <div class="case-wrap16">
                        <div class="filter-bar">
                            <div class="mix-bar row2">
                                <div class="date-sort">
                                    전체
                                </div>
                                <div class="search">
                                    <button type="button" class="icon-button -filter"><span class="hide">필터</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-8">
                        <div class="empty result">
                            <span class="message">
                                조회 결과가 없습니다.
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        window.addEventListener('DOMContentLoaded', () => {
                const toast = document.querySelector('.toast');
                if (!toast) return;

                // 페이지 진입 시 -active 추가
                toast.classList.add('-active');

                setTimeout(() => {
                    toast.classList.remove('-active');
                }, 3000);
            });
    </script>
</body>
</html>
