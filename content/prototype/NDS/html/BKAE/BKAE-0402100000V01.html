<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title></title>

	<link rel="stylesheet" href="../../../../assets/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
	<link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
	<div class="page">
		<div class="container">
            <div class="navigation -mall">
                <header class="header top">
                    <div class="inner process">
                        <div class="funcs">
                            <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                        </div>
                        <h1 class="title">보유상품 변경</h1>
                        <div class="funcs">
                            <button type="button" class="func">취소</button>
                        </div>
                    </div>
                </header>
            </div>
			<main class="contents">
				<div class="content">
                    <div class="h3-group flex-set mb-12">
                        <h2 class="h3">변경상품 확인</h2>
                        <div class="progress-num">
                            <span class="current">04</span>
                            <span class="total">05</span>
                        </div>
                    </div>
                    <p class="sentence3 fw-400">
                        매도 및 매수 상품과 비율을 다시 한번 확인해 주세요.
                    </p>
                    <div class="case-wrap">
                        <div class="h4-group">
                            <h3 class="h4">
                                매도 예정 상품
                            </h3>
                        </div>
                        <div class="list-dl page-sm">
                            <dl class="dl -reversed pd-0">
                                <div class="bd-top">
                                    <dt>신한 마음편한TDF2050증권투자신탁[주식혼합-재간접형](C-re)</dt>
                                    <dd>10,500,000원</dd>
                                </div>
                                <div class="bd-bottom">
                                    <dt>(DC/IRP)우리은행 정기예금 1년</dt>
                                    <dd>10,500,000원</dd>
                                </div>
                                <div class="bd-bottom mt-20">
                                    <dt>매도금액 합계</dt>
                                    <dd class="point">21,000,000원</dd>
                                </div>
                            </dl>
                        </div>
                    </div>
                    <div class="case-wrap">
                        <div class="h4-group">
                            <h3 class="h4">
                                매수예정 상품
                            </h3>
                        </div>
                        <div class="list-dl page-sm">
                            <dl class="dl -reversed pd-0">
                                <div class="bd-top">
                                    <dt>(개인형IRP)애큐온저축은행 정기예금 1년</dt>
                                    <dd>50%</dd>
                                </div>
                                <div class="bd-bottom">
                                    <dt>키움글로벌5G차세대네트워크증권자투자신탁(UH)[주식]ClassC-P2e</dt>
                                    <dd>50%</dd>
                                </div>
                                <div class="bd-bottom mt-20">
                                    <dt>매수비율 합계</dt>
                                    <dd class="point">100%</dd>
                                </div>
                            </dl>
                        </div>
                    </div>

                    <div class="field input -error">
                        <label for="phone7" class="label">이메일주소</label>
                        <div class="mix currency">
                            <div class="text flex-5 -readonly -textless" data-clear="false">
                                <input type="text" class="left-side num-call pr-0" id="phone7" value="userID" placeholder="직접입력"
                                    aria-haspopup="true" readonly>
                            </div>
                            <div class="dash">@</div>
                            <div class="select flex-8">
                                <button type="button" class="right-side choose pl-0 pr-40" aria-haspopup="true"
                                    title="이메일선택">nonghyup.com</button>
                            </div>
                            <p class="info">이메일 양식이 올바르지 않습니다.</p>
                        </div>
                    </div>
				</div>

				<div class="fixer">
					<div class="buttons">
						<button type="button" class="button -primary -lg">다음</button>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery.ui.touch-punch.min.js"></script>
	<script src="../../../../assets/libs/scrollout/dist/scroll-out.min.js"></script>
	<script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
	<script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
	<script src="../../../../assets/js/common-ui.js"></script>
