<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
	<title></title>
	<!-- NDS CSS -->
	<link rel="stylesheet" href="./../assets/css/nds-common.css" />
	<link rel="stylesheet" href="./../assets/css/nds-components.css" />
	<!-- Guide CSS -->
	<link rel="stylesheet" href="./../guide/css/guide.css" />
</head>
<body>
	<div class="nds-page">
	</div>
	<div class="gl">
		<!-- NDS components : S -->
<div class="gc__heading">layer</div>
<script data-size="2" data-title="layer" type="text/template">
	<button type="button"  class="a underline point" onClick="Modal.open('layer')">테스트모드에서 클릭</button>
	<div id="layer" class="nds-layer">
		<div class="nds-container">
			<div class="nds-header">
				<div class="inner">
					<h1 class="title">타이틀</h1>
					<div class="funcs">
						<button type="button" class="func -close" onClick="Modal.close('layer')"><span class="hide">닫기</span></button>
					</div>
				</div>
			</div>

			<div class="nds-contents">
				<div class="nds-content">
					<p>타이틀 영역입니다.</p>
				</div>

				<div class="nds-fixer">
					<div class="nds-cta-wrap">
						<button type="button" class="nds-button -primary -lg -full" onClick="Modal.close('layer')">버튼명</button>
					</div>
				</div>
			</div>
		</div>
	</div>
</script>

<div class="gc__heading">alert</div>
<script data-size="2" data-title="alert" type="text/template">
	<button type="button" class="a underline point" onClick="Modal.open('alert')">테스트모드에서 클릭</button>
	<div id="alert" class="nds-alert">
		<div class="nds-container">
			<div class="nds-contents">
				<div class="nds-content">
					<h1 class="title">타이틀</h1>
					<p>내용을 입력해주세요.</p>
				</div>

				<div class="nds-fixer">
					<div class="nds-cta-wrap">
						<button type="button" class="nds-button -secondary -md -full" onClick="Modal.close('alert')">버튼명</button>
					</div>
				</div>
			</div>
		</div>
	</div>
</script>

<div class="gc__heading">popup</div>
<script data-size="2" data-title="popup" type="text/template">
	<button type="button" class="a underline point" onClick="Modal.open('Popup')">테스트모드에서 클릭</button>
    <div id="Popup" class="nds-popup">
        <div class="nds-container">
            <div class="nds-header">
                <div class="inner">
                    <h1 class="title">서비스 타이틀</h1>
                    <div class="funcs">
                        <button type="button" class="func -close" onClick="Modal.close('Popup')"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="nds-contents">
                <div class="nds-content">
					컨텐츠 영역입니다.
                </div>
            </div>
        </div>
    </div>
</script>

		<!-- NDS components : E -->
	</div>
	<!-- NDS Script -->
	<script src="./../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="./../assets/libs/anime/lib/anime.min.js"></script>
	<script src="./../assets/js/nds-ui.js"></script>
	<!-- Guide Script -->
	<script src="./../guide/js/guide.js"></script>
	<script>
		buildGuide();
	</script>
</body>
</html>
