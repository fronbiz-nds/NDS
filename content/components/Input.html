<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
	<title></title>
	<!-- NDS CSS -->
	<link rel="stylesheet" href="./../assets/css/nds-common.css" />
	<link rel="stylesheet" href="./../assets/css/nds-components.css" />
	<!-- Guide CSS -->
	<link rel="stylesheet" href="./../guide/css/guide.css" />
</head>
<body>
	<div class="gl">
		<!-- NDS components : S -->
<div class="gc__heading">Input-box/basic</div>
<script data-size="2" data-title="State=inactive" type="text/template">
    <div class="nds-field -input" data-nds-role="field">
        <label for="text1" class="nds-label -form">레이블</label>
        <div class="control-wrap" data-nds-role="input-wrap">
            <input type="text" id="text1" class="control" placeholder="플레이스홀더" aria-describedby="info-text1" data-nds-role="control">
        </div>
        <div class="info-wrap">
			<p id="info-text1" class="message" data-nds-role="info" aria-live="polite" aria-atomic="true">안내 문구 입력</p>
		</div>
    </div>
</script>

<script data-size="2" data-title="State=error" type="text/template">
    <div class="nds-field -input -error " data-nds-role="field">
        <label for="text2" class="nds-label -form">레이블</label>
        <div class="control-wrap" data-nds-role="input-wrap">
            <input type="text" id="text2" class="control" placeholder="플레이스홀더" value="입력된 텍스트 입니다" aria-describedby="info-text2" data-nds-role="control" aria-invalid="true">
        </div>
        <div class="info-wrap">
        	<p id="info-text2" class="message" data-nds-role="info" role="alert" aria-live="polite" aria-atomic="true">오류 메시지 출력</p>
		</div>
    </div>
</script>

<script data-size="2" data-title="State=success" type="text/template">
    <div class="nds-field -input -success " data-nds-role="field">
        <label for="text3" class="nds-label -form">레이블</label>
        <div class="control-wrap" data-nds-role="input-wrap">
            <input type="text" id="text3" class="control" placeholder="플레이스홀더" value="입력된 텍스트 입니다" aria-describedby="info-text3" data-nds-role="control">
        </div>
        <div class="info-wrap">
        	<p id="info-text3" class="message" data-nds-role="info" aria-live="polite" aria-atomic="true">검증필요 입력정보 확인 메시지</p>
		</div>
    </div>
</script>

<script data-size="2" data-title="State=readonly" type="text/template">
    <div class="nds-field -input" data-nds-role="field">
        <label for="text4" class="nds-label -form">레이블</label>
        <div class="control-wrap" data-nds-role="input-wrap">
            <input type="text" id="text4" class="control" placeholder="플레이스홀더" value="입력된 텍스트 입니다" aria-describedby="info-text4" data-nds-role="control" readonly>
        </div>
        <div class="info-wrap">
        	<p id="info-text4" class="message" data-nds-role="info" aria-live="polite" aria-atomic="true">안내 문구 입력</p>
		</div>
    </div>
</script>

<script data-size="2" data-title="State=disabled" type="text/template">
    <div class="nds-field -input" data-nds-role="field">
        <label for="text5" class="nds-label -form">레이블</label>
        <div class="control-wrap" data-nds-role="input-wrap">
            <input type="text" id="text5" class="control" placeholder="플레이스홀더" value="입력된 텍스트 입니다" aria-describedby="info-text5" data-nds-role="control" disabled>
        </div>
        <div class="info-wrap">
        	<p id="info-text5" class="message" data-nds-role="info" aria-live="polite" aria-atomic="true">안내 문구 입력</p>
		</div>
    </div>
</script>
		<!-- NDS components : E -->
	</div>
	<!-- NDS Script -->
	<script src="./../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="./../assets/libs/anime/lib/anime.min.js"></script>
	<script src="./../assets/js/nds-ui.js"></script>
	<!-- Guide Script -->
	<script src="./../guide/js/guide.js"></script>
	<script>
		buildGuide();
	</script>
</html>
