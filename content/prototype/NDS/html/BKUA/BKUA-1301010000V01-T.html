<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title></title>

	<link rel="stylesheet" href="../../../../assets/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
	<link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
	<div class="page">
		<div class="container">
            <div class="navigation -mall">
                <header class="header top">
                    <div class="inner process">
                        <div class="funcs">
                            <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                        </div>
                        <h1 class="title">법무부 국고금</h1>
                        <div class="funcs">
                            <button type="button" class="func">취소</button>
                        </div>
                    </div>
                </header>
            </div>
			<main class="contents">
				<div class="content">
                    <div class="h3-group flex-set mb-12">
                        <h2 class="h3">조회</h2>
                        <div class="progress-num">
                            <span class="current">01</span>
                            <span class="total">04</span>
                        </div>
                    </div>
                    <div class="case-wrap">
                        <div class="segments tab -bar mb-12">
                            <div class="outer">
                                <div class="inner">
                                    <div role="tablist" class="list">
                                        <div class="item -active"><button type="button" role="tab" aria-selected="true"
                                                aria-controls="segments-panel3" id="segment5" class="">기납벌과금<span class="hide">선택됨</span></button>
                                        </div>
                                        <div class="item"><button type="button" role="tab" aria-selected="false" aria-controls="segments-panel4"
                                                id="segment6" class="">본납벌과금</button>
                                        </div>
                                        <span class="switcher" aria-hidden="true"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="segments-panels">
                            <div role="tabpanel" aria-labelledby="segment5" id="segments-panel3" class="segments-panel -active" tabindex="0">
                                <p class="info">고지서에 지로번호가 7자리이고, 전자납부번호가 14자리일 경우</p>
                                <div class="field input mt-24 -error">
                                    <label for="tex0" class="label">지로번호</label>
                                    <div class="text -basic">
                                        <input type="tell" id="tex0" class="num-call right" placeholder="숫자 7자리 입력" maxlength="7" readonly>
                                        <p class="info">지로번호를 입력해 주세요.</p>
                                    </div>
                                </div>
                                <div class="field input">
                                    <label for="tex01" class="label">전자납부번호</label>
                                    <div class="text -basic">
                                        <input type="tell" id="tex01" class="num-call right" placeholder="숫자 14자리 입력" maxlength="14" readonly>
                                    </div>
                                </div>
                            </div>
                            <div role="tabpanel" aria-labelledby="segment6" id="segments-panel4" class="segments-panel" tabindex="-1">
                                컨텐츠2
                            </div>
                        </div>
                    </div>
				</div>

                <div class="sticker">
					<div class="notice -active" data-role="fold">
						<button type="button" class="title" data-role="marker">알아두세요</button>
						<div class="panel" data-role="visible">
							<p class="p">이용시간 : 00:30~23:10</p>
						</div>
					</div>
				</div>

				<div class="fixer">
					<div class="buttons">
						<button type="button" class="button -primary -lg">다음</button>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../../../../assets/libs/jquery-ui/jquery.ui.touch-punch.min.js"></script>
	<script src="../../../../assets/libs/scrollout/dist/scroll-out.min.js"></script>
	<script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
	<script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
	<script src="../../../../assets/js/common-ui.js"></script>
	<script>
		// 스크립트 추가
	</script>
</body>
</html>
