<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
	<title></title>
	<!-- NDS CSS -->
	<link rel="stylesheet" href="./../assets/css/nds-common.css" />

<body>
	<div class="gl">
		<!-- NDS components : S -->
<div class="gc__heading">Tooltip-base</div>
<script data-size="2" data-title="" type="text/template">
	<!-- NOTE: span 태그가 남용되어서 접근성에 맞지 않는듯.. 타이틀도 span 태그로 되어있어서 semantic 적으로도 애매해보임. -->
	<div class="nds-tooltip" data-nds-role="tooltip">
		<button type="button" title="도움말" class="nds-button -ico trigger" data-nds-role="tooltip-trigger" aria-expanded="false" aria-controls="tooltip-panel-1">
			<i class="nds-ico -x24 nds-ico-tooltip1" aria-hidden="true"></i><span class="hide">보기</span>
		</button>
		
		<div class="panel" role="tooltip" id="tooltip-panel-1" data-nds-role="tooltip-panel" aria-hidden="true">
			<strong class="title">타이틀</strong>
			<strong class="sub-title">서브 타이틀</strong>
			
			<div class="content">
				<p class="sub-cont">서브 텍스트 내용을 입력해 주세요.</p>
				<!-- NOTE: Bullet 컴포넌트 사용?-->
				<ul class="nds-ul -bullet">
					<li>리스트 내용을 입력해 주세요.</li>
					<li>리스트 내용을 입력해 주세요.</li>
				</ul>
			</div>
		</div>
	</div>
</script>
		<!-- NDS components : E -->
	</div>
	<!-- NDS Script -->
	<script src="./../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="./../assets/libs/anime/lib/anime.min.js"></script>
	<script src="./../assets/js/nds-ui.js"></script>

	<script src="./../guide/js/guide.js"></script>

		buildGuide();
	</script>
