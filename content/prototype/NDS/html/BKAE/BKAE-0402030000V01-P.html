<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="navigation">
                <div class="header">
                    <div class="inner">
                        <h1 class="title">운용상품 선택</h1>
                        <div class="funcs">
                            <button type="button" class="func -close"><span class="hide">닫기</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="prod-count-wrap">
                        <span class="count-tit">선택 상품(최대 5개)</span>
                        <span class="count">0개</span>
                    </div>

                    <div class="subs out">
                        <div class="outer">
                            <div class="inner">
                                <div role="tablist" class="list">
                                    <div class="item -active"><button type="button" role="tab" aria-selected="true"
                                            aria-controls="subs-panel51" id="sub51">현금성자산</button></div>
                                    <div class="item"><button type="button" role="tab" aria-selected="false" aria-controls="subs-panel52"
                                            id="sub52">예금</button></div>
                                    <div class="item"><button type="button" role="tab" aria-selected="false" aria-controls="subs-panel53"
                                            id="sub53">펀드</button></div>
                                    <div class="item"><button type="button" role="tab" aria-selected="false" aria-controls="subs-panel54"
                                            id="sub54">ETF</button></div>
                                    <div class="item"><button type="button" role="tab" aria-selected="false" aria-controls="subs-panel55"
                                            id="sub55">디폴트옵션</button></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="content -wide pb-0">
                        <div class="subs-panels out">
                            <div role="tabpanel" aria-labelledby="sub51" id="subs-panel51" class="subs-panel -active pt-16" tabindex="0">
                                <ul class="mixed-data">
                                    <li>
                                        <div class="account card -list">
                                            <div class="info">
                                                <span class="name">
                                                    <span>농협현금성자산(대기자금)</span>
                                                </span>
                                            </div>
                                
                                            <div class="data-sub">
                                                <span class="title">금리</span>
                                                <span class="value red">5.5%</span>
                                            </div>
                                
                                            <div class="compare-checkbox">
                                                <div class="checkbox -sm">
                                                    <input type="checkbox" id="bordered-account11" checked>
                                                    <label for="bordered-account11"></label>
                                                </div>
                                            </div>
                                        </div>
                                    </li>
                                    <li>
                                        <div class="account card -list">
                                            <div class="info">
                                                <span class="name">
                                                    <span>농협현금성자산(대기자금)</span>
                                                </span>
                                            </div>
                                
                                            <div class="data-sub">
                                                <span class="title">금리</span>
                                                <span class="value red">5.5%</span>
                                            </div>
                                
                                            <div class="compare-checkbox">
                                                <div class="checkbox -sm">
                                                    <input type="checkbox" id="bordered-account112">
                                                    <label for="bordered-account112"></label>
                                                </div>
                                            </div>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <div role="tabpanel" aria-labelledby="sub52" id="subs-panel52" class="subs-panel" tabindex="0">
                                패널2
                            </div>
                            <div role="tabpanel" aria-labelledby="sub53" id="subs-panel53" class="subs-panel" tabindex="0">
                                패널3
                            </div>
                            <div role="tabpanel" aria-labelledby="sub54" id="subs-panel54" class="subs-panel" tabindex="0">
                                패널4
                            </div>
                            <div role="tabpanel" aria-labelledby="sub55" id="subs-panel55" class="subs-panel" tabindex="0">
                                패널5
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sticker">
					<div class="notice -active" data-role="fold">
						<button type="button" class="title" data-role="marker">알아두세요</button>
						<div class="panel" data-role="visible">
							<ul class="ul -bullet">
								<li>현금성 자산이란 정기예금, 투자상품 등의 운용상품으로 운용되지 않는 대기자산입니다. 낮은 금리가 적용되므로  보유상품 변경 및 입금예정상품 신청을 통해 관리해 주시기 바랍니다.</li>
								<li>퇴직금 수령 후 바로 해지하려면 매도기간이 가장 짧은 농협 현금성자산(대기자금)으로 운용을 권해 드립니다.</li>
							</ul>
						</div>
					</div>
				</div>

                <div class="fixer">
					<div class="buttons">
						<button type="button" class="button -primary -lg">확인</button>
					</div>
				</div>
            </div>
        </div>
    </div>

    <script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        window.addEventListener('DOMContentLoaded', () => {
                const toast = document.querySelector('.toast');
                if (!toast) return;

                // 페이지 진입 시 -active 추가
                toast.classList.add('-active');

                setTimeout(() => {
                    toast.classList.remove('-active');
                }, 3000);
            });
    </script>
</body>
</html>
