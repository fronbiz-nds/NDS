<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../../../assets/css/common-ui.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="navigation">
                <div class="header">
                    <div class="inner">
                        <h1 class="title">휴대폰 본인인증</h1>
                        <div class="funcs">
                            <button type="button" class="func -close"><span class="hide">닫기</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            본인인증을 위해 문자메시지를 <br>
                            보내주세요
                        </h2>
                    </div>

                    <div class="img-box">
                        <img src="../../../../assets/imgs/nds/common/img_phone-regist_module_189.png" style="height:18.9rem" alt="문자메시지 보내기 이미지">
                    </div>

                    <div class="case-wrap">
                        <div class="h5-group">
                            <h5 class="h5 fw-500">등록 메시지를 그대로 보내주세요.</h5>
                        </div>
                        <p class="p">
                            문자메시지를 수정 없이 전송해주세요.<br>
                            통신사 요금제에 따라 전송비용(20원)이 부과됩니다.
                        </p>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">문자메시지 보내기</button>
                    </div>
                </div>

                <!-- 토스트팝업은 -active 클래스 사용하여 실행합니다 -->
                <div class="toast" role="alert" aria-live="assertive">
                    <div class="message">
                        <p>기기 등록을 완료했어요.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        window.addEventListener('DOMContentLoaded', () => {
                const toast = document.querySelector('.toast');
                if (!toast) return;

                // 페이지 진입 시 -active 추가
                toast.classList.add('-active');

                setTimeout(() => {
                    toast.classList.remove('-active');
                }, 3000);
            });
    </script>
</body>
</html>
