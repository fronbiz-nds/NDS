<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
	<title></title>
	<!-- NDS CSS -->
	<link rel="stylesheet" href="./../assets/css/nds-common.css" />
	<link rel="stylesheet" href="./../assets/css/nds-components.css" />
	<!-- Guide CSS -->
	<link rel="stylesheet" href="./../guide/css/guide.css" />
</head>
<body>
	<div class="gl">
		<!-- NDS components : S -->
<div class="gc__heading">controls-controller</div>
<script data-size="2" data-title="Status=default" type="text/template">
	<button type="button" title="이전" class="nds-button -ico prev">
		<i class="nds-ico -x24 nds-ico-left2" aria-hidden="true"></i><span class="hide">이전</span>
	</button>
	<button type="button" title="다음" class="nds-button -ico next">
		<i class="nds-ico -x24 nds-ico-right2" aria-hidden="true"></i><span class="hide">다음</span>
	</button>
</script>
<script data-size="2" data-title="Status=disabled" type="text/template">
	<button type="button" title="이전" class="nds-button -ico prev" disabled>
		<i class="nds-ico -x24 nds-ico-left2" aria-hidden="true"></i><span class="hide">이전</span>
	</button>
	<button type="button" title="다음" class="nds-button -ico next" disabled>
		<i class="nds-ico -x24 nds-ico-right2" aria-hidden="true"></i><span class="hide">다음</span>
	</button>
</script>

<div class="gc__heading">controls-stepper</div>
<script data-size="2" data-title="" type="text/template">
	<div class="nds-stepper" data-nds-role="stepper">
		<button type="button" title="수량" class="nds-button -ico minus" data-nds-role="step-minus" disabled>
			<i class="nds-ico -x24 nds-ico-minus-x24" aria-hidden="true"></i>
			<span class="hide">감소</span>
		</button>
		
		<div class="nds-stepper-input">
			<input type="number" class="nds-input-val" value="0" min="0" max="99" data-nds-role="step-val" title="수량 입력">
		</div>
		
		<button type="button" title="수량" class="nds-button -ico plus" data-nds-role="step-plus">
			<i class="nds-ico -x24 nds-ico-plus-x24" aria-hidden="true"></i>
			<span class="hide">증가</span>
		</button>
	</div>
</script>
		<!-- NDS components : E -->
	</div>
	<!-- NDS Script -->
	<script src="./../assets/libs/jquery/jquery-3.6.0.min.js"></script>
	<script src="./../assets/libs/anime/lib/anime.min.js"></script>
	<script src="./../assets/js/nds-ui.js"></script>
	<!-- Guide Script -->
	<script src="./../guide/js/guide.js"></script>
	<script>
		buildGuide();
		NDS_UI.Controls();
	</script>
</body>
</html>
