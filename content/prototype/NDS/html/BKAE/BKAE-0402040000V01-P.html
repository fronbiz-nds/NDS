    <script>
        Popup.open('popup');

        window.addEventListener('DOMContentLoaded', () => {
                const toast = document.querySelector('.toast');
                if (!toast) return;

                // 페이지 진입 시 -active 추가
                toast.classList.add('-active');

                setTimeout(() => {
                    toast.classList.remove('-active');
                }, 3000);
            });
    </script>
